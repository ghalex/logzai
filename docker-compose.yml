services:
  # Gateway
  logzai-gateway:
    image: nginx:alpine
    container_name: logzai-gateway
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./gateway.conf:/etc/nginx/nginx.conf:ro
      - /etc/letsencrypt:/etc/letsencrypt:ro
    depends_on:
      - logzai-frontend
      - logzai-api
    restart: unless-stopped

  # Frontend React application
  logzai-frontend:
    image: ghalex/logzai-frontend
    container_name: logzai-frontend
    environment:
      NODE_ENV: production
    restart: unless-stopped
    depends_on:
      - logzai-api
    ports:
      - "4000:4000"
    healthcheck:
      test:
        [
          "CMD",
          "wget",
          "--no-verbose",
          "--tries=1",
          "--spider",
          "http://logzai-frontend:4000/healthz",
        ]
      interval: 120s
      timeout: 10s
      retries: 3
      start_period: 40s

  # Backend API
  logzai-api:
    image: ghalex/logzai-api:latest
    container_name: logzai-api
    env_file:
      - .env
    volumes:
      - ${DATA_DIR:-./data}/logs:/app/data
    restart: unless-stopped
    depends_on:
      - logzai-redis
      - logzai-db
    healthcheck:
      test: ["CMD", "curl", "-f", "http://logzai-api:8000/healthz"]
      interval: 120s
      timeout: 10s
      retries: 3
      start_period: 40s

  # Ingestor service for processing incoming logs
  logzai-ingestor:
    image: ghalex/logzai-ingestor:latest
    container_name: logzai-ingestor
    ports:
      - "10000:10000"
    env_file:
      - .env
    volumes:
      - ${DATA_DIR:-./data}/logs:/app/data
    depends_on:
      - logzai-redis
      - logzai-db
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:10000/healthz"]
      interval: 120s
      timeout: 10s
      retries: 3
      start_period: 40s

  # Celery worker for background tasks
  logzai-worker:
    image: ghalex/logzai-worker:latest
    container_name: logzai-worker
    env_file:
      - .env
    volumes:
      - ${DATA_DIR:-./data}/logs:/app/data
    depends_on:
      - logzai-redis
      - logzai-db
    restart: unless-stopped

  # Celery beat scheduler
  logzai-beat:
    image: ghalex/logzai-beat:latest
    container_name: logzai-beat
    env_file:
      - .env
    volumes:
      - ${DATA_DIR:-./data}/logs:/app/data
    depends_on:
      - logzai-redis
      - logzai-db
    restart: unless-stopped

  # Redis for caching and task queue
  logzai-redis:
    image: redis:8.2.3-alpine
    container_name: logzai-redis
    ports:
      - "6379:6379"
    command: redis-server --appendonly yes
    volumes:
      - ${DATA_DIR:-./data}/redis:/data
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 30s
      timeout: 10s
      retries: 3

  # PostgreSQL Database
  logzai-db:
    image: postgres:16-alpine
    container_name: logzai-db
    env_file:
      - .env
    volumes:
      - ${DATA_DIR:-./data}/db:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U logzai"]
      interval: 30s
      timeout: 10s
      retries: 3

networks:
  default:
    name: logzai-network

